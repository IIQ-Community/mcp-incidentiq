name: Dependabot auto-merge

# Enables auto-merge for Dependabot PRs that are patch or minor updates; major updates are left
# for manual review. main has strict required status checks, so GitHub only completes the merge
# after all CI passes. With SOLO_MODE the ruleset requires 0 approvals, so these low-risk bumps
# need no human review. Grouped dev/prod minor+patch PRs (see dependabot.yml) merge as a unit.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # PR author, not github.actor: the lockfile-sync workflow's PAT push changes github.actor,
    # which would otherwise make this auto-merge job skip on the post-sync run.
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch & minor updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
