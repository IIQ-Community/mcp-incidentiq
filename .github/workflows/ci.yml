name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Single bun job. Its check context is "ci" - the main-branch ruleset's
  # required_status_checks references exactly this (see scripts/setup-github-governance.sh).
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Test (with coverage)
        run: bun test tests/unit --coverage --coverage-reporter=lcov --coverage-reporter=text

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: ${{ always() }}
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
