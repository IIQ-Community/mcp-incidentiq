name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Least-privilege GITHUB_TOKEN: CI only needs to read the repo (checkout, build,
# test). Codecov (continue-on-error) and upload-artifact need no extra scopes.
permissions:
  contents: read

jobs:
  # Single Node job. Its check context is "ci" - the main-branch ruleset's
  # required_status_checks references exactly this (see scripts/setup-github-governance.sh).
  # Do NOT rename this job: a different check name makes main unmergeable.
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Test (with coverage)
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: ${{ always() }}
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
