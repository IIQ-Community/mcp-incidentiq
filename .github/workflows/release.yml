name: Release

# semantic-release on every push to main: computes the next 0.x version from Conventional
# Commits, publishes the package to GitHub Packages (@iiq-community scope) + a GitHub Release
# (with the npm tarball attached as a token-free install), and commits the CHANGELOG /
# CITATION.cff / package.json / package-lock.json / src/index.ts bump back with [skip ci].
# The whole job runs on Node 24 (current LTS) + npm.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_TOKEN is a fine-grained admin PAT (contents+issues+pull-requests write). The default
      # GITHUB_TOKEN (github-actions[bot]) cannot bypass the main-branch ruleset, so semantic-release's
      # commit-back to main would be blocked; the admin PAT bypasses as Repository admin. Create it at
      # Settings > Secrets > Actions > RELEASE_TOKEN (see CONTRIBUTING > Repository Governance).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          # Falls back to GITHUB_TOKEN when RELEASE_TOKEN is unset so non-release pushes still run;
          # only an actual release's commit-back needs the admin PAT (else it is blocked by the ruleset).
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      # IMPORTANT: deliberately NO registry-url/scope here -- do NOT re-add them. With them, setup-node
      # writes a userconfig .npmrc containing `//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}` and
      # points NPM_CONFIG_USERCONFIG at it. @semantic-release/npm's set-npmrc-auth then reads that literal
      # `${NODE_AUTH_TOKEN}` placeholder, treats the registry as already-authenticated, and SKIPS
      # injecting NPM_TOKEN -- so `npm publish` runs with an unset NODE_AUTH_TOKEN and 401s (verified
      # v0.5.0 failure, 2026-06-15). The registry is supplied by package.json `publishConfig.registry`,
      # and @semantic-release/npm writes `//npm.pkg.github.com/:_authToken=${NPM_TOKEN}` itself.
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (release gate)
        run: npm test

      # semantic-release's @semantic-release/exec prepareCmd runs
      # `node scripts/sync-release-version.js` here to sync package.json / CITATION.cff / src/index.ts.
      - name: Semantic Release
        run: npx semantic-release
        env:
          # @semantic-release/git + github: admin PAT bypasses the main-branch ruleset for the commit-back
          # (falls back to GITHUB_TOKEN on no-release pushes; a real release without the PAT fails at the
          # ruleset-blocked commit-back).
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # @semantic-release/npm -> GitHub Packages: the DEFAULT token, which gains packages:write from the
          # job `permissions` above. NOT the admin PAT (not assumed to carry packages:write).
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
