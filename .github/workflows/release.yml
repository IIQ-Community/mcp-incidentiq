name: Release

# semantic-release on every push to main: computes the next 0.x version from
# Conventional Commits, publishes a GitHub Release, and commits the CHANGELOG /
# CITATION.cff / package.json bump back with [skip ci] to avoid a re-trigger loop.
# Node 24 matches the devcontainer AND satisfies semantic-release 25's engines.node
# (^22.14.0 || >=24.10.0); its CLI hard-exits on older Node, so 20 would fail every run.
# NOTE: the [skip ci] release commit pushes to main; the future branch-protection
# governance ruleset must allow GITHUB_TOKEN / the release bot to bypass the PR rule.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_TOKEN is a fine-grained admin PAT (contents+issues+pull-requests write). The default
      # GITHUB_TOKEN (github-actions[bot]) cannot bypass the main-branch ruleset, so semantic-release's
      # commit-back to main would be blocked; the admin PAT bypasses as Repository admin. Create it at
      # Settings > Secrets > Actions > RELEASE_TOKEN (see CONTRIBUTING > Repository Governance).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          # Falls back to GITHUB_TOKEN when RELEASE_TOKEN is unset so non-release pushes still run;
          # only an actual release's commit-back needs the admin PAT (else it is blocked by the ruleset).
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test (release gate)
        run: yarn test

      - name: Semantic Release
        run: npx semantic-release
        env:
          # Admin PAT so the @semantic-release/git commit-back bypasses the main-branch ruleset.
          # Falls back to GITHUB_TOKEN (no-release pushes no-op fine; a real release without the PAT
          # fails informatively at the ruleset-blocked commit-back).
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
