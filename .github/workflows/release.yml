name: Release

# semantic-release on every push to main: computes the next 0.x version from
# Conventional Commits, publishes a GitHub Release, and commits the CHANGELOG /
# CITATION.cff / package.json bump back with [skip ci] to avoid a re-trigger loop.
# Node 20 is intentional (semantic-release v25 needs >=20.8.1; 20 is the active LTS)
# even though the devcontainer runs Node 24 - no build behavior diverges here.
# NOTE: the [skip ci] release commit pushes to main; the future branch-protection
# governance ruleset must allow GITHUB_TOKEN / the release bot to bypass the PR rule.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test (release gate)
        run: yarn test

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
