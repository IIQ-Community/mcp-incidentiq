# Conventional Commits enforcement via the pre-commit framework (NOT husky).
# The pre-commit tool is installed by the gvatsal60/pre-commit devcontainer feature;
# `pre-commit install --hook-type commit-msg` wires this hook (auto-run by post-start.sh).
default_install_hook_types: [commit-msg]
repos:
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@21.0.2"]
